    <path d="M-100,-90 A12,16 0 0,1 -76,-90" />
    <path d="M-62,-100 A12,16 0 0,1 -38,-100" />
    <path d="M-24,-105 A12,16 0 0,1 0,-105" />
    <path d="M0,-105 A12,16 0 0,1 24,-105" />
    <path d="M38,-100 A12,16 0 0,1 62,-100" />
    <path d="M76,-90 A12,16 0 0,1 100,-90" />
    <!-- Middle arch row -->
    <path d="M-120,-40 A14,20 0 0,1 -92,-40" />
    <path d="M-82,-48 A14,20 0 0,1 -54,-48" />
    <path d="M-44,-52 A14,20 0 0,1 -16,-52" />
    <path d="M-6,-53 A14,20 0 0,1 22,-53" />
    <path d="M32,-52 A14,20 0 0,1 60,-52" />
    <path d="M70,-48 A14,20 0 0,1 98,-48" />
    <path d="M108,-40 A14,20 0 0,1 130,-40" />
    <!-- Bottom arch row -->
    <path d="M-128,10 A16,24 0 0,1 -96,10" />
    <path d="M-86,6 A16,24 0 0,1 -54,6" />
    <path d="M-44,4 A16,24 0 0,1 -12,4" />
    <path d="M-2,3 A16,24 0 0,1 30,3" />
    <path d="M40,4 A16,24 0 0,1 72,4" />
    <path d="M82,6 A16,24 0 0,1 114,6" />
    <!-- Broken right side -->
    <path d="M110,-70 L120,-50 L125,-20 L128,10" stroke="#6B5B73" stroke-width="6" fill="none"/>
